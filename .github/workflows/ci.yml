name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  release-bundle-vars:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.vars.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Resolve bundle validation tag
        id: vars
        shell: bash
        run: |
          VERSION_VALUE="$(tr -d '[:space:]' < VERSION)"

          if [[ ! "${VERSION_VALUE}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must be MAJOR.MINOR.PATCH. Got: ${VERSION_VALUE}" >&2
            exit 1
          fi

          echo "tag=v${VERSION_VALUE}" >> "${GITHUB_OUTPUT}"

  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Validate VERSION file
        shell: bash
        run: |
          if [[ ! -f VERSION ]]; then
            echo "VERSION file is missing." >&2
            exit 1
          fi

          VERSION_VALUE="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "${VERSION_VALUE}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must be MAJOR.MINOR.PATCH. Got: ${VERSION_VALUE}" >&2
            exit 1
          fi

      - name: Validate README pinned version references
        shell: bash
        run: |
          python3 - <<'PY'
          import re
          import tempfile
          from pathlib import Path

          def validate_readme(version_path: Path, readme_path: Path) -> None:
              version = version_path.read_text(encoding="utf-8").strip()
              if not re.fullmatch(r"\d+\.\d+\.\d+", version):
                  raise SystemExit(f"VERSION must be MAJOR.MINOR.PATCH. Got: {version}")

              readme = readme_path.read_text(encoding="utf-8")
              tag = f"v{version}"
              expected_counts = {
                  f'$tag = "{tag}"': 4,
                  f'tag="{tag}"': 3,
                  f'`VERSION={version}` must release as `{tag}`': 1,
                  f'SemVer without `v`, for example `{version}`': 1,
                  f'(for example: `{tag}`).': 1,
                  f'(for example `{tag}`)': 1,
                  f'git tag {tag}': 1,
                  f'git push origin {tag}': 1,
              }

              count_mismatches = [
                  (snippet, expected, readme.count(snippet))
                  for snippet, expected in expected_counts.items()
                  if readme.count(snippet) != expected
              ]
              if count_mismatches:
                  print("README.md version validation failed.")
                  print(f"Expected VERSION-derived tag: {tag}")
                  print("Snippet counts did not match expected values:")
                  for snippet, expected, actual in count_mismatches:
                      print(f"- expected {expected} occurrence(s), found {actual}: {snippet}")
                  raise SystemExit(1)

              pattern = re.compile(r'(?:\$tag = "|tag=")v\d+\.\d+\.\d+|git tag v\d+\.\d+\.\d+|git push origin v\d+\.\d+\.\d+|`VERSION=\d+\.\d+\.\d+` must release as `v\d+\.\d+\.\d+`|\(for example `\d+\.\d+\.\d+`\)\.|\(for example: `v\d+\.\d+\.\d+`\)\.|\(for example `v\d+\.\d+\.\d+`\)')
              mismatches = sorted({match.group(0) for match in pattern.finditer(readme) if version not in match.group(0)})
              if mismatches:
                  print("README.md contains pinned version references that do not match VERSION.")
                  print(f"Expected VERSION-derived tag: {tag}")
                  print("Mismatched snippets:")
                  for snippet in mismatches:
                      print(f"- {snippet}")
                  raise SystemExit(1)

          validate_readme(Path("VERSION"), Path("README.md"))

          version = Path("VERSION").read_text(encoding="utf-8").strip()
          temp_dir = Path(tempfile.mkdtemp(prefix="readme-version-regression-"))

          mismatched_version = temp_dir / "VERSION"
          mismatched_version.write_text("9.9.9\n", encoding="utf-8")
          readme_copy = temp_dir / "README.md"
          readme_copy.write_text(Path("README.md").read_text(encoding="utf-8"), encoding="utf-8")

          try:
              validate_readme(mismatched_version, readme_copy)
          except SystemExit as exc:
              if exc.code == 0:
                  raise
          else:
              raise SystemExit("Expected README validation to fail for a VERSION mismatch fixture")

          mismatched_readme = temp_dir / "README-mismatch.md"
          mismatched_readme.write_text(
              Path("README.md").read_text(encoding="utf-8").replace(
                  f"git tag v{version}",
                  "git tag v9.9.9",
                  1,
              ),
              encoding="utf-8",
          )

          try:
              validate_readme(Path("VERSION"), mismatched_readme)
          except SystemExit as exc:
              if exc.code == 0:
                  raise
          else:
              raise SystemExit("Expected README validation to fail for a pinned tag mismatch fixture")

          print(f"README pinned version references match VERSION={version} and reject mismatches.")
          PY

      - name: Validate bounded frontmatter regressions
        shell: bash
        run: |
          python3 - <<'PY'
          import importlib.util
          import textwrap
          from pathlib import Path

          repo_root = Path(".").resolve()

          def load_module(rel_path: str, module_name: str):
              spec = importlib.util.spec_from_file_location(module_name, repo_root / rel_path)
              module = importlib.util.module_from_spec(spec)
              assert spec.loader is not None
              spec.loader.exec_module(module)
              return module

          copilot = load_module("scripts/export-copilot-agents.py", "export_copilot_agents")
          codex = load_module("scripts/export-codex-agents.py", "export_codex_agents")

          valid_scalar_fixture = textwrap.dedent(
              """\
              ---
              name: bounded-valid
              description: Valid bounded frontmatter fixture
              mode: subagent
              temperature: 0
              ---
              Body line.
              """
          )
          valid_tools_fixture = textwrap.dedent(
              """\
              ---
              name: bounded-valid-tools
              description: Valid bounded frontmatter fixture with tools
              mode: subagent
              temperature: 0
              tools:
                bash: true
              ---
              Body line.
              """
          )

          copilot_fm, copilot_body = copilot.parse_frontmatter(
              valid_scalar_fixture, Path("valid-copilot.md")
          )
          assert copilot_fm["name"] == "bounded-valid"
          assert copilot_body == "Body line.\n"

          codex_fm, codex_tools, codex_body = codex.parse_frontmatter(
              valid_tools_fixture, Path("valid-codex.md")
          )
          assert codex_fm["name"] == "bounded-valid-tools"
          assert codex_tools == {"bash": True}
          assert codex_body == "Body line.\n"

          invalid_cases = [
              (
                  "unbounded",
                  textwrap.dedent(
                      """\
                      ---
                      name: invalid
                      description: Missing closing boundary
                      mode: subagent
                      temperature: 0
                      Body line.
                      """
                  ),
                  "unterminated frontmatter block",
              ),
              (
                  "blank-line",
                  textwrap.dedent(
                      """\
                      ---
                      name: invalid

                      description: Blank line should fail
                      mode: subagent
                      temperature: 0
                      ---
                      Body line.
                      """
                  ),
                  "blank lines are not allowed inside frontmatter",
              ),
              (
                  "structured-value",
                  textwrap.dedent(
                      """\
                      ---
                      name: invalid
                      description: [not, bounded]
                      mode: subagent
                      temperature: 0
                      ---
                      Body line.
                      """
                  ),
                  "uses unsupported structured value",
              ),
          ]

          for module, label in ((copilot, "copilot"), (codex, "codex")):
              for case_name, fixture, expected_error in invalid_cases:
                  try:
                      module.parse_frontmatter(fixture, Path(f"{label}-{case_name}.md"))
                  except ValueError as exc:
                      if expected_error not in str(exc):
                          raise AssertionError(
                              f"{label} {case_name} error mismatch: {exc}"
                          )
                  else:
                      raise AssertionError(
                          f"{label} accepted invalid frontmatter case: {case_name}"
                      )

          print("Bounded frontmatter fixtures pass valid cases and reject malformed or unbounded inputs.")
          PY

      - name: Validate schema tool
        shell: bash
        run: |
          python3 --version
          python3 opencode/tools/validate-schema.py --help
          python3 scripts/export-copilot-agents.py --source-agents opencode/agents --target-dir ./.tmp-copilot --strict --dry-run
          python3 scripts/export-codex-agents.py --source-agents opencode/agents --target-dir ./.tmp-codex --strict --dry-run

      - name: Validate optional stale generated-file cleanup
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          required_tokens = {
              "scripts/export-copilot-agents.py": [
                  "find_stale_generated_outputs",
                  "Removed stale generated file:",
              ],
              "scripts/export-codex-agents.py": [
                  "find_stale_generated_outputs",
                  "Removed stale generated file:",
              ],
          }

          missing = []
          for rel_path, tokens in required_tokens.items():
              content = Path(rel_path).read_text(encoding="utf-8")
              if any(token not in content for token in tokens):
                  missing.append(rel_path)

          if missing:
              print(
                  "Skipping optional stale cleanup regression checks; DS-003 implementation not detected in: "
                  + ", ".join(missing)
              )
              raise SystemExit(0)
          PY

          rm -rf ./.tmp-stale-cleanup

          python3 scripts/export-copilot-agents.py --source-agents opencode/agents --target-dir ./.tmp-stale-cleanup/copilot --strict
          printf '%s\n' '<!-- Generated by scripts/export-copilot-agents.py -->' > ./.tmp-stale-cleanup/copilot/stale.agent.md
          printf '%s\n' 'custom copilot agent content' > ./.tmp-stale-cleanup/copilot/custom.agent.md
          python3 scripts/export-copilot-agents.py --source-agents opencode/agents --target-dir ./.tmp-stale-cleanup/copilot --strict

          python3 - <<'PY'
          from pathlib import Path

          stale = Path('./.tmp-stale-cleanup/copilot/stale.agent.md')
          custom = Path('./.tmp-stale-cleanup/copilot/custom.agent.md')
          if stale.exists():
              raise SystemExit(f"Expected stale generated Copilot file to be removed: {stale}")
          if not custom.exists():
              raise SystemExit(f"Expected custom Copilot file to remain: {custom}")
          print(f"Copilot cleanup check passed: removed {stale.name}, kept {custom.name}")
          PY

          python3 scripts/export-codex-agents.py --source-agents opencode/agents --target-dir ./.tmp-stale-cleanup/codex --strict
          printf '%s\n' '# Generated by scripts/export-codex-agents.py' > ./.tmp-stale-cleanup/codex/agents/stale.toml
          printf '%s\n' 'custom_codex_role = true' > ./.tmp-stale-cleanup/codex/agents/custom.toml
          python3 scripts/export-codex-agents.py --source-agents opencode/agents --target-dir ./.tmp-stale-cleanup/codex --strict

          python3 - <<'PY'
          from pathlib import Path

          stale = Path('./.tmp-stale-cleanup/codex/agents/stale.toml')
          custom = Path('./.tmp-stale-cleanup/codex/agents/custom.toml')
          if stale.exists():
              raise SystemExit(f"Expected stale generated Codex role to be removed: {stale}")
          if not custom.exists():
              raise SystemExit(f"Expected custom Codex role to remain: {custom}")
          print(f"Codex cleanup check passed: removed {stale.name}, kept {custom.name}")
          PY

      - name: Validate modernize handoff schema and examples
        shell: bash
        run: |
          python3 scripts/validate-modernize-handoff.py --help
          python3 -m py_compile scripts/validate-modernize-handoff.py
          python3 -m pip install jsonschema

          python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/dispatch-plan.schema.json \
            --input opencode/protocols/examples/dispatch-plan.resource.valid.json \
            --require-jsonschema

          if python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/dispatch-plan.schema.json \
            --input opencode/protocols/examples/dispatch-plan.resource.invalid.json \
            --require-jsonschema; then
            echo "Expected invalid dispatch plan example to fail schema validation." >&2
            exit 1
          fi

          if python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/dispatch-plan.schema.json \
            --input opencode/protocols/examples/dispatch-plan.browser-unsafe.invalid.json \
            --require-jsonschema; then
            echo "Expected unsafe browser dispatch plan example to fail schema validation." >&2
            exit 1
          fi

          if python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/dispatch-plan.schema.json \
            --input opencode/protocols/examples/dispatch-plan.process-unsafe.invalid.json \
            --require-jsonschema; then
            echo "Expected unsafe process dispatch plan example to fail schema validation." >&2
            exit 1
          fi

          if python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/dispatch-plan.schema.json \
            --input opencode/protocols/examples/dispatch-plan.server-no-teardown.invalid.json \
            --require-jsonschema; then
            echo "Expected server dispatch plan without teardown to fail schema validation." >&2
            exit 1
          fi

          python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/modernize-exec-handoff.schema.json \
            --input opencode/protocols/examples/modernize-exec-handoff.valid.json \
            --require-jsonschema

          if python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/modernize-exec-handoff.schema.json \
            --input opencode/protocols/examples/modernize-exec-handoff.invalid.json \
            --require-jsonschema; then
            echo "Expected invalid modernize handoff example to fail schema validation." >&2
            exit 1
          fi

      - name: Validate status schemas and fixtures
        shell: bash
        run: |
          python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/run-status.schema.json \
            --input opencode/protocols/examples/status-layout.run-only.valid/run-status.json \
            --require-jsonschema

          python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/run-status.schema.json \
            --input opencode/protocols/examples/status-layout.expanded.valid/run-status.json \
            --require-jsonschema

          python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/task-status.schema.json \
            --input opencode/protocols/examples/status-layout.expanded.valid/tasks/task-doc-summary.json \
            --require-jsonschema

          python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/task-status.schema.json \
            --input opencode/protocols/examples/status-layout.expanded.valid/tasks/task-process-build.json \
            --require-jsonschema

          python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/task-status.schema.json \
            --input opencode/protocols/examples/status-layout.expanded.valid/tasks/task-local-server-smoke.json \
            --require-jsonschema

          python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/task-status.schema.json \
            --input opencode/protocols/examples/status-layout.expanded.valid/tasks/task-browser-resume.json \
            --require-jsonschema

          python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/agent-status.schema.json \
            --input opencode/protocols/examples/status-layout.expanded.valid/agents/agent-doc-01.json \
            --require-jsonschema

          python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/agent-status.schema.json \
            --input opencode/protocols/examples/status-layout.expanded.valid/agents/agent-process-01.json \
            --require-jsonschema

          python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/agent-status.schema.json \
            --input opencode/protocols/examples/status-layout.expanded.valid/agents/agent-server-01.json \
            --require-jsonschema

          python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/agent-status.schema.json \
            --input opencode/protocols/examples/status-layout.expanded.valid/agents/agent-browser-02.json \
            --require-jsonschema

          if python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/run-status.schema.json \
            --input opencode/protocols/examples/status-layout.contract.invalid/run-status.json \
            --require-jsonschema; then
            echo "Expected invalid status layout run-status fixture to fail schema validation." >&2
            exit 1
          fi

          if python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/task-status.schema.json \
            --input opencode/protocols/examples/status-layout.contract.invalid/tasks/task-browser-cleanup-invalid.json \
            --require-jsonschema; then
            echo "Expected invalid status layout task fixture to fail schema validation." >&2
            exit 1
          fi

          if python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/agent-status.schema.json \
            --input opencode/protocols/examples/status-layout.contract.invalid/agents/agent-browser-cleanup-invalid.json \
            --require-jsonschema; then
            echo "Expected invalid status layout agent fixture to fail schema validation." >&2
            exit 1
          fi

      - name: Validate resource-control prompt coverage
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          checks = {
              Path("opencode/agents/router.md"): [
                  "resource_class",
                  "max_parallelism",
                  "teardown_required",
                  "browser",
                  "server",
              ],
              Path("opencode/agents/orchestrator-pipeline.md"): [
                  "resource_class = browser",
                  "teardown_required = true",
                  "Resource Gate",
              ],
              Path("opencode/agents/orchestrator-flow.md"): [
                  "resource-safe to co-run",
                  "teardown evidence",
                  "browser",
                  "server",
              ],
              Path("opencode/agents/executor-core.md"): ["RESOURCE CLEANUP (MANDATORY)"],
              Path("opencode/agents/executor-advanced.md"): ["RESOURCE CLEANUP (MANDATORY)"],
              Path("opencode/agents/generalist.md"): ["RESOURCE CLEANUP (MANDATORY)"],
              Path("opencode/agents/peon.md"): ["RESOURCE CLEANUP (MANDATORY)"],
              Path("opencode/agents/test-runner.md"): ["RESOURCE CLEANUP (MANDATORY)"],
              Path("opencode/agents/reviewer.md"): ["RESOURCE EVIDENCE", "teardown_required"],
              Path("opencode/protocols/PIPELINE_PROTOCOL.md"): [
                  "resource_class",
                  "max_parallelism",
                  "teardown_required",
                  "batches set `teardown_required = true` only",
              ],
              Path("opencode/protocols/PROTOCOL_SUMMARY.md"): [
                  "resource_class",
                  "max_parallelism",
                  "teardown_required",
                  "lingering child-process resources",
              ],
              Path("opencode/protocols/VALIDATION.md"): [
                  "## Resource Gate",
                  "teardown_required = true",
              ],
              Path("opencode/protocols/SCHEMAS.md"): [
                  "required batch resource metadata",
              ],
              Path("opencode/commands/run-pipeline.md"): [
                  "teardown evidence",
              ],
              Path("opencode/commands/run-flow.md"): [
                  "teardown evidence",
              ],
              Path("README.md"): [
                  "Execution Resource Control",
                  "dispatch-plan resource schema/examples validation",
                  "resource-control prompt coverage assertions",
              ],
          }

          missing = []
          for path, tokens in checks.items():
              text = path.read_text(encoding="utf-8")
              absent = [token for token in tokens if token not in text]
              if absent:
                  missing.append(f"{path}: missing {absent}")

          if missing:
              raise SystemExit("\n".join(missing))

          print("Resource-control prompt coverage checks passed.")
          PY

      - name: Validate shell installers
        shell: bash
        run: |
          bash -n scripts/install.sh
          bash -n scripts/install-copilot.sh
          bash -n scripts/install-codex.sh
          bash -n scripts/bootstrap-install.sh
          bash -n scripts/bootstrap-install-copilot.sh
          bash -n scripts/bootstrap-install-codex.sh
          bash scripts/install.sh --target ./.tmp-opencode-install --dry-run
          bash scripts/install-copilot.sh --target ./.tmp-copilot-install --dry-run
          bash scripts/install-codex.sh --target ./.tmp-codex-install --dry-run

      - name: Validate shell bootstrap installers
        shell: bash
        run: |
          mkdir -p ./.tmp-bootstrap-mocks
          cat > ./.tmp-bootstrap-mocks/curl <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          url="${@: -1}"
          case "$url" in
            https://api.github.com/repos/example/agents/releases/latest)
              cat <<'JSON'
          {"assets":[{"browser_download_url":"https://example.invalid/agents-pipeline-opencode-bundle-v1.2.3.tar.gz"},{"browser_download_url":"https://example.invalid/agents-pipeline-opencode-bundle-v1.2.3.SHA256SUMS.txt"}]}
          JSON
              ;;
            https://api.github.com/repos/example/agents/releases/tags/v1.2.3)
              cat <<'JSON'
          {"assets":[{"browser_download_url":"https://example.invalid/agents-pipeline-opencode-bundle-v1.2.3.tar.gz"},{"browser_download_url":"https://example.invalid/agents-pipeline-opencode-bundle-v1.2.3.SHA256SUMS.txt"}]}
          JSON
              ;;
            *)
              echo "Unexpected curl URL: $url" >&2
              exit 1
              ;;
          esac
          EOF
          chmod +x ./.tmp-bootstrap-mocks/curl
          export PATH="$PWD/.tmp-bootstrap-mocks:$PATH"

          bash scripts/bootstrap-install.sh --repo example/agents --version latest --target ./.tmp-bootstrap-install --dry-run
          bash scripts/bootstrap-install-copilot.sh --repo example/agents --version 1.2.3 --target ./.tmp-bootstrap-copilot --no-backup --dry-run
          bash scripts/bootstrap-install-codex.sh --repo example/agents --version v1.2.3 --target ./.tmp-bootstrap-codex --no-backup --force --dry-run

  validate-release-bundle:
    needs: release-bundle-vars
    uses: ./.github/workflows/release-bundle.yml
    permissions:
      contents: read
    with:
      tag: ${{ needs.release-bundle-vars.outputs.tag }}
      checkout_tag: false

  validate-powershell:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Validate PowerShell installers
        shell: pwsh
        run: |
          [void](Get-Command -Name ./scripts/install.ps1)
          [void](Get-Command -Name ./scripts/install-copilot.ps1)
          [void](Get-Command -Name ./scripts/install-codex.ps1)
          [void](Get-Command -Name ./scripts/bootstrap-install.ps1)
          [void](Get-Command -Name ./scripts/bootstrap-install-copilot.ps1)
          [void](Get-Command -Name ./scripts/bootstrap-install-codex.ps1)
          pwsh -NoProfile -File scripts/install.ps1 -Target .\.tmp-opencode-install -DryRun
          pwsh -NoProfile -File scripts/install-copilot.ps1 -Target .\.tmp-copilot-install -DryRun
          pwsh -NoProfile -File scripts/install-codex.ps1 -Target .\.tmp-codex-install -DryRun

          $previousNativeSetting = $PSNativeCommandUseErrorActionPreference
          $PSNativeCommandUseErrorActionPreference = $false

          & pwsh -NoProfile -File scripts/install.ps1 -Target '-Force' -DryRun 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw 'install.ps1 should reject switch-like target values.'
          }

          & pwsh -NoProfile -File scripts/install-copilot.ps1 -Target '-NoBackup' -DryRun 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw 'install-copilot.ps1 should reject switch-like target values.'
          }

          & pwsh -NoProfile -File scripts/install-codex.ps1 -Target '-Force' -DryRun 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw 'install-codex.ps1 should reject switch-like target values.'
          }

          $PSNativeCommandUseErrorActionPreference = $previousNativeSetting
          $global:LASTEXITCODE = 0

      - name: Validate PowerShell bootstrap installers
        shell: pwsh
        run: |
          function Invoke-RestMethod {
            param(
              [Parameter(ValueFromRemainingArguments = $true)]
              $Arguments,
              [hashtable]$Headers,
              [string]$Uri,
              [string]$Method
            )

            if ($Uri -notin @(
              'https://api.github.com/repos/example/agents/releases/latest',
              'https://api.github.com/repos/example/agents/releases/tags/v1.2.3'
            )) {
              throw "Unexpected release URI: $Uri"
            }

            return [pscustomobject]@{
              assets = @(
                [pscustomobject]@{
                  name = 'agents-pipeline-opencode-bundle-v1.2.3.zip'
                  browser_download_url = 'https://example.invalid/agents-pipeline-opencode-bundle-v1.2.3.zip'
                },
                [pscustomobject]@{
