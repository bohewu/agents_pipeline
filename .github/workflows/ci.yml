          USAGE_PLUGIN_TARGET="./.tmp-plugin-install/usage-status.js"
          BOOTSTRAP_PLUGIN_TARGET="./.tmp-bootstrap-plugin/status-runtime.js"
          BOOTSTRAP_EFFORT_PLUGIN_TARGET="./.tmp-bootstrap-plugin/effort-control.js"
          BOOTSTRAP_USAGE_PLUGIN_TARGET="./.tmp-bootstrap-plugin/usage-status.js"

          bash -n scripts/install.sh
          bash -n scripts/install-copilot.sh
          bash -n scripts/install-claude.sh
          bash -n scripts/install-codex.sh
          bash -n scripts/install-plugin-status-runtime.sh
          bash -n scripts/install-plugin-effort-control.sh
          bash -n scripts/install-plugin-usage-status.sh
          bash -n scripts/install-usage-only.sh
          bash -n scripts/install-all-local.sh
          bash -n scripts/bootstrap-install.sh
          bash -n scripts/bootstrap-install-copilot.sh
          bash -n scripts/bootstrap-install-claude.sh
          bash -n scripts/bootstrap-install-codex.sh
          bash -n scripts/bootstrap-install-plugin-status-runtime.sh
          bash -n scripts/bootstrap-install-plugin-effort-control.sh
          bash -n scripts/bootstrap-install-usage-only.sh
          bash -n scripts/bootstrap-install-all-local.sh
          bash scripts/install.sh --target ./.tmp-opencode-install --dry-run
          bash scripts/install-copilot.sh --target ./.tmp-copilot-install --dry-run
          bash scripts/install-claude.sh --target ./.tmp-claude-install --dry-run
          bash scripts/install-codex.sh --target ./.tmp-codex-install --dry-run
          plugin_output="$(bash scripts/install-plugin-status-runtime.sh --target "${PLUGIN_TARGET}" --dry-run)"
          [[ "${plugin_output}" == *"Target entry: ${PLUGIN_TARGET}"* ]]
          [[ "${plugin_output}" == *"Target support dir: ./.tmp-plugin-install/status-runtime"* ]]
          [[ "${plugin_output}" == *"Would copy entry file:"* ]]
          [[ "${plugin_output}" == *"Would sync support dir:"* ]]
          effort_plugin_output="$(bash scripts/install-plugin-effort-control.sh --target "${EFFORT_PLUGIN_TARGET}" --dry-run)"
          [[ "${effort_plugin_output}" == *"Target entry: ${EFFORT_PLUGIN_TARGET}"* ]]
          [[ "${effort_plugin_output}" == *"Target support dir: ./.tmp-plugin-install/effort-control"* ]]
          usage_plugin_output="$(bash scripts/install-plugin-usage-status.sh --target "${USAGE_PLUGIN_TARGET}" --dry-run)"
          [[ "${usage_plugin_output}" == *"Target entry: ${USAGE_PLUGIN_TARGET}"* ]]
          [[ "${usage_plugin_output}" == *"Target support dir: ./.tmp-plugin-install/usage-status"* ]]
          usage_only_output="$(bash scripts/install-usage-only.sh --opencode-target ./.tmp-opencode-install --usage-plugin-target "${USAGE_PLUGIN_TARGET}" --dry-run)"
          [[ "${usage_only_output}" == *"Usage plugin target: ${USAGE_PLUGIN_TARGET}"* ]]
          [[ "${usage_only_output}" == *"Target support dir: ./.tmp-plugin-install/usage-status"* ]]
          [[ "${usage_only_output}" == *"Usage-only install completed in dry-run mode."* ]]
          all_local_output="$(bash scripts/install-all-local.sh --opencode-target ./.tmp-opencode-install --plugin-target "${PLUGIN_TARGET}" --copilot-target ./.tmp-copilot-install --claude-target ./.tmp-claude-install --codex-target ./.tmp-codex-install --dry-run)"
          [[ "${all_local_output}" == *"Target entry: ${PLUGIN_TARGET}"* ]]
          [[ "${all_local_output}" == *"Target support dir: ./.tmp-plugin-install/status-runtime"* ]]
          [[ "${all_local_output}" == *"Target entry: ${EFFORT_PLUGIN_TARGET}"* ]]
          [[ "${all_local_output}" == *"Target support dir: ./.tmp-plugin-install/effort-control"* ]]

      - name: Validate shell bootstrap installers
        if: env.DOCS_ONLY != 'true'
        shell: bash
        run: |
          BOOTSTRAP_PLUGIN_TARGET="./.tmp-bootstrap-plugin/status-runtime.js"
          BOOTSTRAP_EFFORT_PLUGIN_TARGET="./.tmp-bootstrap-plugin/effort-control.js"
          BOOTSTRAP_USAGE_PLUGIN_TARGET="./.tmp-bootstrap-plugin/usage-status.js"

          mkdir -p ./.tmp-bootstrap-mocks
          cat > ./.tmp-bootstrap-mocks/curl <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          url="${@: -1}"
          case "$url" in
            https://api.github.com/repos/example/agents/releases/latest)
              cat <<'JSON'
          {"tag_name":"v1.2.3","assets":[{"browser_download_url":"https://example.invalid/agents-pipeline-opencode-bundle-v1.2.3.tar.gz"},{"browser_download_url":"https://example.invalid/agents-pipeline-opencode-bundle-v1.2.3.SHA256SUMS.txt"}]}
          JSON
              ;;
            https://api.github.com/repos/example/agents/releases/tags/v1.2.3)
              cat <<'JSON'
          {"tag_name":"v1.2.3","assets":[{"browser_download_url":"https://example.invalid/agents-pipeline-opencode-bundle-v1.2.3.tar.gz"},{"browser_download_url":"https://example.invalid/agents-pipeline-opencode-bundle-v1.2.3.SHA256SUMS.txt"}]}
          JSON
              ;;
            *)
              echo "Unexpected curl URL: $url" >&2
              exit 1
              ;;
          esac
          EOF
          chmod +x ./.tmp-bootstrap-mocks/curl
          export PATH="$PWD/.tmp-bootstrap-mocks:$PATH"

          bash scripts/bootstrap-install.sh --repo example/agents --version latest --target ./.tmp-bootstrap-install --dry-run
          bash scripts/bootstrap-install-copilot.sh --repo example/agents --version 1.2.3 --target ./.tmp-bootstrap-copilot --no-backup --dry-run
          bash scripts/bootstrap-install-claude.sh --repo example/agents --version 1.2.3 --target ./.tmp-bootstrap-claude --no-backup --dry-run
          bash scripts/bootstrap-install-codex.sh --repo example/agents --version v1.2.3 --target ./.tmp-bootstrap-codex --no-backup --force --dry-run
          bootstrap_plugin_output="$(bash scripts/bootstrap-install-plugin-status-runtime.sh --repo example/agents --version 1.2.3 --target "${BOOTSTRAP_PLUGIN_TARGET}" --no-backup --dry-run)"
          [[ "${bootstrap_plugin_output}" == *"Install target override: ${BOOTSTRAP_PLUGIN_TARGET}"* ]]
          bootstrap_effort_output="$(bash scripts/bootstrap-install-plugin-effort-control.sh --repo example/agents --version 1.2.3 --target "${BOOTSTRAP_EFFORT_PLUGIN_TARGET}" --no-backup --dry-run)"
          [[ "${bootstrap_effort_output}" == *"Install target override: ${BOOTSTRAP_EFFORT_PLUGIN_TARGET}"* ]]
          bootstrap_usage_output="$(bash scripts/bootstrap-install-usage-only.sh --repo example/agents --version 1.2.3 --opencode-target ./.tmp-bootstrap-install --usage-plugin-target "${BOOTSTRAP_USAGE_PLUGIN_TARGET}" --no-backup --dry-run)"
          [[ "${bootstrap_usage_output}" == *"Dry run complete. No files were downloaded or installed."* ]]
          bootstrap_all_output="$(bash scripts/bootstrap-install-all-local.sh --repo example/agents --version v1.2.3 --opencode-target ./.tmp-bootstrap-install --plugin-target "${BOOTSTRAP_PLUGIN_TARGET}" --copilot-target ./.tmp-bootstrap-copilot --claude-target ./.tmp-bootstrap-claude --codex-target ./.tmp-bootstrap-codex --no-backup --force-codex --dry-run)"
          [[ "${bootstrap_all_output}" == *"Dry run complete. No files were downloaded or installed."* ]]

  validate-release-bundle:
    needs:
      - detect-changes
      - release-bundle-vars
    if: needs.detect-changes.outputs.docs_only != 'true'
    uses: ./.github/workflows/release-bundle.yml
    permissions:
      contents: read
      attestations: write
      id-token: write
    with:
      tag: ${{ needs.release-bundle-vars.outputs.tag }}
      checkout_tag: false

  validate-powershell:
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true'
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Validate PowerShell installers
        shell: pwsh
        run: |
          $pluginTarget = '.\.tmp-plugin-install\status-runtime.js'
          $resolvedPluginTarget = $ExecutionContext.SessionState.Path.GetUnresolvedProviderPathFromPSPath($pluginTarget)
          $resolvedPluginSupportDir = Join-Path (Split-Path -Parent $resolvedPluginTarget) 'status-runtime'
          $effortPluginTarget = '.\.tmp-plugin-install\effort-control.js'
          $resolvedEffortPluginTarget = $ExecutionContext.SessionState.Path.GetUnresolvedProviderPathFromPSPath($effortPluginTarget)
          $resolvedEffortPluginSupportDir = Join-Path (Split-Path -Parent $resolvedEffortPluginTarget) 'effort-control'
          $usagePluginTarget = '.\.tmp-plugin-install\usage-status.js'
          $resolvedUsagePluginTarget = $ExecutionContext.SessionState.Path.GetUnresolvedProviderPathFromPSPath($usagePluginTarget)
          $resolvedUsagePluginSupportDir = Join-Path (Split-Path -Parent $resolvedUsagePluginTarget) 'usage-status'

          [void](Get-Command -Name ./scripts/install.ps1)
          [void](Get-Command -Name ./scripts/install-copilot.ps1)
          [void](Get-Command -Name ./scripts/install-claude.ps1)
          [void](Get-Command -Name ./scripts/install-codex.ps1)
          [void](Get-Command -Name ./scripts/install-plugin-status-runtime.ps1)
          [void](Get-Command -Name ./scripts/install-plugin-effort-control.ps1)
          [void](Get-Command -Name ./scripts/install-plugin-usage-status.ps1)
          [void](Get-Command -Name ./scripts/install-usage-only.ps1)
          [void](Get-Command -Name ./scripts/install-all-local.ps1)
          [void](Get-Command -Name ./scripts/bootstrap-install.ps1)
          [void](Get-Command -Name ./scripts/bootstrap-install-copilot.ps1)
          [void](Get-Command -Name ./scripts/bootstrap-install-claude.ps1)
          [void](Get-Command -Name ./scripts/bootstrap-install-codex.ps1)
          [void](Get-Command -Name ./scripts/bootstrap-install-plugin-status-runtime.ps1)
          [void](Get-Command -Name ./scripts/bootstrap-install-plugin-effort-control.ps1)
          [void](Get-Command -Name ./scripts/bootstrap-install-usage-only.ps1)
          [void](Get-Command -Name ./scripts/bootstrap-install-all-local.ps1)
          pwsh -NoProfile -File scripts/install.ps1 -Target .\.tmp-opencode-install -DryRun
          pwsh -NoProfile -File scripts/install-copilot.ps1 -Target .\.tmp-copilot-install -DryRun
          pwsh -NoProfile -File scripts/install-claude.ps1 -Target .\.tmp-claude-install -DryRun
          pwsh -NoProfile -File scripts/install-codex.ps1 -Target .\.tmp-codex-install -DryRun
          $pluginOutput = & pwsh -NoProfile -File scripts/install-plugin-status-runtime.ps1 -Target $pluginTarget -DryRun | Out-String
          if ($pluginOutput -notmatch [regex]::Escape("Target entry: $resolvedPluginTarget")) {
            throw 'install-plugin-status-runtime.ps1 did not report the plugin entry-file target.'
          }
          if ($pluginOutput -notmatch [regex]::Escape("Target support dir: $resolvedPluginSupportDir")) {
            throw 'install-plugin-status-runtime.ps1 did not report the plugin support directory.'
          }
          $effortPluginOutput = & pwsh -NoProfile -File scripts/install-plugin-effort-control.ps1 -Target $effortPluginTarget -DryRun | Out-String
          if ($effortPluginOutput -notmatch [regex]::Escape("Target entry: $resolvedEffortPluginTarget")) {
            throw 'install-plugin-effort-control.ps1 did not report the plugin entry-file target.'
          }
          if ($effortPluginOutput -notmatch [regex]::Escape("Target support dir: $resolvedEffortPluginSupportDir")) {
            throw 'install-plugin-effort-control.ps1 did not report the plugin support directory.'
          }
          $usagePluginOutput = & pwsh -NoProfile -File scripts/install-plugin-usage-status.ps1 -Target $usagePluginTarget -DryRun | Out-String
          if ($usagePluginOutput -notmatch [regex]::Escape("Target entry: $resolvedUsagePluginTarget")) {
            throw 'install-plugin-usage-status.ps1 did not report the plugin entry-file target.'
          }
          if ($usagePluginOutput -notmatch [regex]::Escape("Target support dir: $resolvedUsagePluginSupportDir")) {
            throw 'install-plugin-usage-status.ps1 did not report the plugin support directory.'
          }
          $usageOnlyOutput = & pwsh -NoProfile -File scripts/install-usage-only.ps1 -OpenCodeTarget .\.tmp-opencode-install -UsagePluginTarget $usagePluginTarget -DryRun | Out-String
          if ($usageOnlyOutput -notmatch [regex]::Escape("Usage plugin target: $usagePluginTarget")) {
            throw 'install-usage-only.ps1 did not report the usage plugin target.'
          }
          if ($usageOnlyOutput -notmatch [regex]::Escape("Target support dir: $resolvedUsagePluginSupportDir")) {
            throw 'install-usage-only.ps1 did not forward the usage plugin support directory semantics.'
          }
          if ($usageOnlyOutput -notmatch 'Usage-only install completed in dry-run mode\.') {
            throw 'install-usage-only.ps1 dry-run did not complete successfully.'
          }
          $allLocalOutput = & pwsh -NoProfile -File scripts/install-all-local.ps1 -OpenCodeTarget .\.tmp-opencode-install -PluginTarget $pluginTarget -CopilotTarget .\.tmp-copilot-install -ClaudeTarget .\.tmp-claude-install -CodexTarget .\.tmp-codex-install -DryRun | Out-String
          if ($allLocalOutput -notmatch [regex]::Escape("Target entry: $resolvedPluginTarget")) {
            throw 'install-all-local.ps1 did not forward the plugin entry-file target.'
          }
          if ($allLocalOutput -notmatch [regex]::Escape("Target support dir: $resolvedPluginSupportDir")) {
            throw 'install-all-local.ps1 did not forward the plugin support directory semantics.'
          }
          if ($allLocalOutput -notmatch [regex]::Escape("Target entry: $resolvedEffortPluginTarget")) {
            throw 'install-all-local.ps1 did not forward the effort plugin entry-file target.'
          }
          if ($allLocalOutput -notmatch [regex]::Escape("Target support dir: $resolvedEffortPluginSupportDir")) {
            throw 'install-all-local.ps1 did not forward the effort plugin support directory semantics.'
          }

          $previousNativeSetting = $PSNativeCommandUseErrorActionPreference
          $PSNativeCommandUseErrorActionPreference = $false

          & pwsh -NoProfile -File scripts/install.ps1 -Target '-Force' -DryRun 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw 'install.ps1 should reject switch-like target values.'
          }

          & pwsh -NoProfile -File scripts/install-copilot.ps1 -Target '-NoBackup' -DryRun 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw 'install-copilot.ps1 should reject switch-like target values.'
          }

          & pwsh -NoProfile -File scripts/install-claude.ps1 -Target '-NoBackup' -DryRun 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw 'install-claude.ps1 should reject switch-like target values.'
          }

          & pwsh -NoProfile -File scripts/install-codex.ps1 -Target '-Force' -DryRun 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw 'install-codex.ps1 should reject switch-like target values.'
          }

          & pwsh -NoProfile -File scripts/install-plugin-status-runtime.ps1 -Target '-NoBackup' -DryRun 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw 'install-plugin-status-runtime.ps1 should reject switch-like target values.'
          }

          & pwsh -NoProfile -File scripts/install-plugin-effort-control.ps1 -Target '-NoBackup' -DryRun 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw 'install-plugin-effort-control.ps1 should reject switch-like target values.'
          }

          & pwsh -NoProfile -File scripts/install-plugin-usage-status.ps1 -Target '-NoBackup' -DryRun 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw 'install-plugin-usage-status.ps1 should reject switch-like target values.'
          }

          Invoke-Pester -Script tests/install-codex.Tests.ps1 -EnableExit

          $PSNativeCommandUseErrorActionPreference = $previousNativeSetting
          $global:LASTEXITCODE = 0

      - name: Validate PowerShell bootstrap installers
        shell: pwsh
        run: |
          $bootstrapPluginTarget = '.\.tmp-bootstrap-plugin\status-runtime.js'
          $bootstrapEffortPluginTarget = '.\.tmp-bootstrap-plugin\effort-control.js'
          $bootstrapUsagePluginTarget = '.\.tmp-bootstrap-plugin\usage-status.js'

          function Invoke-RestMethod {
            param(
              [Parameter(ValueFromRemainingArguments = $true)]
              $Arguments,
              [hashtable]$Headers,
              [string]$Uri,
              [string]$Method
            )

            if ($Uri -notin @(
              'https://api.github.com/repos/example/agents/releases/latest',
              'https://api.github.com/repos/example/agents/releases/tags/v1.2.3'
            )) {
              throw "Unexpected release URI: $Uri"
            }

            return [pscustomobject]@{
              tag_name = 'v1.2.3'
              assets = @(
                [pscustomobject]@{
                  name = 'agents-pipeline-opencode-bundle-v1.2.3.zip'
                  browser_download_url = 'https://example.invalid/agents-pipeline-opencode-bundle-v1.2.3.zip'
                },
                [pscustomobject]@{
                  name = 'agents-pipeline-opencode-bundle-v1.2.3.SHA256SUMS.txt'
                  browser_download_url = 'https://example.invalid/agents-pipeline-opencode-bundle-v1.2.3.SHA256SUMS.txt'
                }
              )
            }
          }

          & ./scripts/bootstrap-install.ps1 -Repo example/agents -Version latest -Target .\.tmp-bootstrap-install -DryRun
          & ./scripts/bootstrap-install-copilot.ps1 -Repo example/agents -Version 1.2.3 -Target .\.tmp-bootstrap-copilot -NoBackup -DryRun
          & ./scripts/bootstrap-install-claude.ps1 -Repo example/agents -Version 1.2.3 -Target .\.tmp-bootstrap-claude -NoBackup -DryRun
          & ./scripts/bootstrap-install-codex.ps1 -Repo example/agents -Version v1.2.3 -Target .\.tmp-bootstrap-codex -NoBackup -Force -DryRun
          $bootstrapPluginOutput = & ./scripts/bootstrap-install-plugin-status-runtime.ps1 -Repo example/agents -Version 1.2.3 -Target $bootstrapPluginTarget -NoBackup -DryRun 6>&1 | Out-String
          if ($bootstrapPluginOutput -notmatch [regex]::Escape("Install target override: $bootstrapPluginTarget")) {
