name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  release-bundle-vars:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.vars.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Resolve bundle validation tag
        id: vars
        shell: bash
        run: |
          VERSION_VALUE="$(tr -d '[:space:]' < VERSION)"

          if [[ ! "${VERSION_VALUE}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must be MAJOR.MINOR.PATCH. Got: ${VERSION_VALUE}" >&2
            exit 1
          fi

          echo "tag=v${VERSION_VALUE}" >> "${GITHUB_OUTPUT}"

  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Validate VERSION and README alignment
        shell: bash
        run: |
          if [[ ! -f VERSION ]]; then
            echo "VERSION file is missing." >&2
            exit 1
          fi

          VERSION_VALUE="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "${VERSION_VALUE}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must be MAJOR.MINOR.PATCH. Got: ${VERSION_VALUE}" >&2
            exit 1
          fi

          if ! grep -q "v${VERSION_VALUE}" README.md; then
            echo "README.md must include the current version tag v${VERSION_VALUE}." >&2
            exit 1
          fi

      - name: Validate schema tool
        shell: bash
        run: |
          python3 --version
          python3 opencode/tools/validate-schema.py --help
          python3 scripts/export-copilot-agents.py --source-agents opencode/agents --target-dir ./.tmp-copilot --strict --dry-run
          python3 scripts/export-codex-agents.py --source-agents opencode/agents --target-dir ./.tmp-codex --strict --dry-run

      - name: Validate optional stale generated-file cleanup
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          required_tokens = {
              "scripts/export-copilot-agents.py": [
                  "find_stale_generated_outputs",
                  "Removed stale generated file:",
              ],
              "scripts/export-codex-agents.py": [
                  "find_stale_generated_outputs",
                  "Removed stale generated file:",
              ],
          }

          missing = []
          for rel_path, tokens in required_tokens.items():
              content = Path(rel_path).read_text(encoding="utf-8")
              if any(token not in content for token in tokens):
                  missing.append(rel_path)

          if missing:
              print(
                  "Skipping optional stale cleanup regression checks; DS-003 implementation not detected in: "
                  + ", ".join(missing)
              )
              raise SystemExit(0)
          PY

          rm -rf ./.tmp-stale-cleanup

          python3 scripts/export-copilot-agents.py --source-agents opencode/agents --target-dir ./.tmp-stale-cleanup/copilot --strict
          printf '%s\n' '<!-- Generated by scripts/export-copilot-agents.py -->' > ./.tmp-stale-cleanup/copilot/stale.agent.md
          printf '%s\n' 'custom copilot agent content' > ./.tmp-stale-cleanup/copilot/custom.agent.md
          python3 scripts/export-copilot-agents.py --source-agents opencode/agents --target-dir ./.tmp-stale-cleanup/copilot --strict

          python3 - <<'PY'
          from pathlib import Path

          stale = Path('./.tmp-stale-cleanup/copilot/stale.agent.md')
          custom = Path('./.tmp-stale-cleanup/copilot/custom.agent.md')
          if stale.exists():
              raise SystemExit(f"Expected stale generated Copilot file to be removed: {stale}")
          if not custom.exists():
              raise SystemExit(f"Expected custom Copilot file to remain: {custom}")
          print(f"Copilot cleanup check passed: removed {stale.name}, kept {custom.name}")
          PY

          python3 scripts/export-codex-agents.py --source-agents opencode/agents --target-dir ./.tmp-stale-cleanup/codex --strict
          printf '%s\n' '# Generated by scripts/export-codex-agents.py' > ./.tmp-stale-cleanup/codex/agents/stale.toml
          printf '%s\n' 'custom_codex_role = true' > ./.tmp-stale-cleanup/codex/agents/custom.toml
          python3 scripts/export-codex-agents.py --source-agents opencode/agents --target-dir ./.tmp-stale-cleanup/codex --strict

          python3 - <<'PY'
          from pathlib import Path

          stale = Path('./.tmp-stale-cleanup/codex/agents/stale.toml')
          custom = Path('./.tmp-stale-cleanup/codex/agents/custom.toml')
          if stale.exists():
              raise SystemExit(f"Expected stale generated Codex role to be removed: {stale}")
          if not custom.exists():
              raise SystemExit(f"Expected custom Codex role to remain: {custom}")
          print(f"Codex cleanup check passed: removed {stale.name}, kept {custom.name}")
          PY

      - name: Validate modernize handoff schema and examples
        shell: bash
        run: |
          python3 scripts/validate-modernize-handoff.py --help
          python3 -m py_compile scripts/validate-modernize-handoff.py
          python3 -m pip install jsonschema

          python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/modernize-exec-handoff.schema.json \
            --input opencode/protocols/examples/modernize-exec-handoff.valid.json \
            --require-jsonschema

          if python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/modernize-exec-handoff.schema.json \
            --input opencode/protocols/examples/modernize-exec-handoff.invalid.json \
            --require-jsonschema; then
            echo "Expected invalid modernize handoff example to fail schema validation." >&2
            exit 1
          fi

      - name: Validate shell installers
        shell: bash
        run: |
          bash -n scripts/install.sh
          bash -n scripts/install-copilot.sh
          bash -n scripts/install-codex.sh
          bash -n scripts/bootstrap-install.sh
          bash -n scripts/bootstrap-install-copilot.sh
          bash -n scripts/bootstrap-install-codex.sh
          bash scripts/install.sh --target ./.tmp-opencode-install --dry-run
          bash scripts/install-copilot.sh --target ./.tmp-copilot-install --dry-run
          bash scripts/install-codex.sh --target ./.tmp-codex-install --dry-run

      - name: Validate shell bootstrap installers
        shell: bash
        run: |
          mkdir -p ./.tmp-bootstrap-mocks
          cat > ./.tmp-bootstrap-mocks/curl <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          url="${@: -1}"
          case "$url" in
            https://api.github.com/repos/example/agents/releases/latest)
              cat <<'JSON'
          {"assets":[{"browser_download_url":"https://example.invalid/agents-pipeline-opencode-bundle-v1.2.3.tar.gz"},{"browser_download_url":"https://example.invalid/agents-pipeline-opencode-bundle-v1.2.3.SHA256SUMS.txt"}]}
          JSON
              ;;
            https://api.github.com/repos/example/agents/releases/tags/v1.2.3)
              cat <<'JSON'
          {"assets":[{"browser_download_url":"https://example.invalid/agents-pipeline-opencode-bundle-v1.2.3.tar.gz"},{"browser_download_url":"https://example.invalid/agents-pipeline-opencode-bundle-v1.2.3.SHA256SUMS.txt"}]}
          JSON
              ;;
            *)
              echo "Unexpected curl URL: $url" >&2
              exit 1
              ;;
          esac
          EOF
          chmod +x ./.tmp-bootstrap-mocks/curl
          export PATH="$PWD/.tmp-bootstrap-mocks:$PATH"

          bash scripts/bootstrap-install.sh --repo example/agents --version latest --target ./.tmp-bootstrap-install --dry-run
          bash scripts/bootstrap-install-copilot.sh --repo example/agents --version 1.2.3 --target ./.tmp-bootstrap-copilot --no-backup --dry-run
          bash scripts/bootstrap-install-codex.sh --repo example/agents --version v1.2.3 --target ./.tmp-bootstrap-codex --no-backup --force --dry-run

  validate-release-bundle:
    needs: release-bundle-vars
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.release-bundle-vars.outputs.tag }}
      publish_assets: false
      checkout_tag: false

  validate-powershell:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Validate PowerShell installers
        shell: pwsh
        run: |
          [void](Get-Command -Name ./scripts/install.ps1)
          [void](Get-Command -Name ./scripts/install-copilot.ps1)
          [void](Get-Command -Name ./scripts/install-codex.ps1)
          [void](Get-Command -Name ./scripts/bootstrap-install.ps1)
          [void](Get-Command -Name ./scripts/bootstrap-install-copilot.ps1)
          [void](Get-Command -Name ./scripts/bootstrap-install-codex.ps1)
          pwsh -NoProfile -File scripts/install.ps1 -Target .\.tmp-opencode-install -DryRun
          pwsh -NoProfile -File scripts/install-copilot.ps1 -Target .\.tmp-copilot-install -DryRun
          pwsh -NoProfile -File scripts/install-codex.ps1 -Target .\.tmp-codex-install -DryRun

          $previousNativeSetting = $PSNativeCommandUseErrorActionPreference
          $PSNativeCommandUseErrorActionPreference = $false

          & pwsh -NoProfile -File scripts/install.ps1 -Target '-Force' -DryRun 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw 'install.ps1 should reject switch-like target values.'
          }

          & pwsh -NoProfile -File scripts/install-copilot.ps1 -Target '-NoBackup' -DryRun 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw 'install-copilot.ps1 should reject switch-like target values.'
          }

          & pwsh -NoProfile -File scripts/install-codex.ps1 -Target '-Force' -DryRun 2>$null
          if ($LASTEXITCODE -eq 0) {
            throw 'install-codex.ps1 should reject switch-like target values.'
          }

          $PSNativeCommandUseErrorActionPreference = $previousNativeSetting
          $global:LASTEXITCODE = 0

      - name: Validate PowerShell bootstrap installers
        shell: pwsh
        run: |
          function Invoke-RestMethod {
            param(
              [Parameter(ValueFromRemainingArguments = $true)]
              $Arguments,
              [hashtable]$Headers,
              [string]$Uri,
              [string]$Method
            )

            if ($Uri -notin @(
              'https://api.github.com/repos/example/agents/releases/latest',
              'https://api.github.com/repos/example/agents/releases/tags/v1.2.3'
            )) {
              throw "Unexpected release URI: $Uri"
            }

            return [pscustomobject]@{
              assets = @(
                [pscustomobject]@{
                  name = 'agents-pipeline-opencode-bundle-v1.2.3.zip'
                  browser_download_url = 'https://example.invalid/agents-pipeline-opencode-bundle-v1.2.3.zip'
                },
                [pscustomobject]@{
                  name = 'agents-pipeline-opencode-bundle-v1.2.3.SHA256SUMS.txt'
                  browser_download_url = 'https://example.invalid/agents-pipeline-opencode-bundle-v1.2.3.SHA256SUMS.txt'
                }
              )
            }
          }

          & ./scripts/bootstrap-install.ps1 -Repo example/agents -Version latest -Target .\.tmp-bootstrap-install -DryRun
          & ./scripts/bootstrap-install-copilot.ps1 -Repo example/agents -Version 1.2.3 -Target .\.tmp-bootstrap-copilot -NoBackup -DryRun
          & ./scripts/bootstrap-install-codex.ps1 -Repo example/agents -Version v1.2.3 -Target .\.tmp-bootstrap-codex -NoBackup -Force -DryRun
