name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      docs_only: ${{ steps.scope.outputs.docs_only }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Classify change scope
        id: scope
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PUSH_BEFORE: ${{ github.event.before }}
          PULL_REQUEST_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PULL_REQUEST_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "workflow_dispatch requested; running full validation."
            echo "docs_only=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            base_sha="${PULL_REQUEST_BASE_SHA}"
            head_sha="${PULL_REQUEST_HEAD_SHA}"
          else
            base_sha="${PUSH_BEFORE}"
            head_sha="${CURRENT_SHA}"
            if [[ -z "${base_sha}" || "${base_sha}" =~ ^0+$ ]]; then
              echo "Push event has no usable before SHA; running full validation."
              echo "docs_only=false" >> "${GITHUB_OUTPUT}"
              exit 0
            fi
          fi

          changed_file_list="$(git diff --name-only "${base_sha}" "${head_sha}")"
          if [[ -z "${changed_file_list}" ]]; then
            echo "No changed files detected; running full validation to stay conservative."
            echo "docs_only=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          docs_only=true
          while IFS= read -r path; do
            [[ -z "${path}" ]] && continue
            case "${path}" in
              README.md|CHANGELOG.md|CONTRIBUTING.md|SECURITY.md|COMPATIBILITY.md|CODEOWNERS|docs/*|.github/ISSUE_TEMPLATE/*|.github/pull_request_template.md)
                ;;
              *)
                docs_only=false
                break
                ;;
            esac
          done <<< "${changed_file_list}"

          echo "Changed files under review:"
          while IFS= read -r path; do
            [[ -z "${path}" ]] && continue
            echo "- ${path}"
          done <<< "${changed_file_list}"

          echo "docs_only=${docs_only}" >> "${GITHUB_OUTPUT}"
          echo "Doc-only classification: ${docs_only}"

  release-bundle-vars:
    needs: detect-changes
    if: needs.detect-changes.outputs.docs_only != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.vars.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Resolve bundle validation tag
        id: vars
        shell: bash
        run: |
          VERSION_VALUE="$(tr -d '[:space:]' < VERSION)"

          if [[ ! "${VERSION_VALUE}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must be MAJOR.MINOR.PATCH. Got: ${VERSION_VALUE}" >&2
            exit 1
          fi

          echo "tag=v${VERSION_VALUE}" >> "${GITHUB_OUTPUT}"

  validate:
    needs: detect-changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DOCS_ONLY: ${{ needs.detect-changes.outputs.docs_only }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Summarize validation scope
        shell: bash
        run: |
          if [[ "${DOCS_ONLY}" == "true" ]]; then
            echo "Docs-only change detected; running lightweight validation subset."
          else
            echo "Non-doc change detected; running full validation suite."
          fi

      - name: Validate VERSION file
        shell: bash
        run: |
          if [[ ! -f VERSION ]]; then
            echo "VERSION file is missing." >&2
            exit 1
          fi

          VERSION_VALUE="$(tr -d '[:space:]' < VERSION)"
          if [[ ! "${VERSION_VALUE}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "VERSION must be MAJOR.MINOR.PATCH. Got: ${VERSION_VALUE}" >&2
            exit 1
          fi

      - name: Validate README pinned version references
        shell: bash
        run: |
          python3 scripts/sync-readme-version.py --check
          python3 - <<'PY'
          import subprocess
          import tempfile
          from pathlib import Path

          script = Path("scripts/sync-readme-version.py")
          version = Path("VERSION").read_text(encoding="utf-8").strip()
          temp_dir = Path(tempfile.mkdtemp(prefix="readme-version-regression-"))

          def expect_failure(args, label):
              result = subprocess.run(
                  ["python3", str(script), "--check", *args],
                  check=False,
                  capture_output=True,
                  text=True,
              )
              if result.returncode == 0:
                  raise SystemExit(f"Expected README validation to fail for {label}")

          mismatched_version = temp_dir / "VERSION"
          mismatched_version.write_text("9.9.9\n", encoding="utf-8")
          readme_copy = temp_dir / "README.md"
          readme_copy.write_text(Path("README.md").read_text(encoding="utf-8"), encoding="utf-8")
          expect_failure(
              ["--version-file", str(mismatched_version), "--readme", str(readme_copy)],
              "a VERSION mismatch fixture",
          )

          mismatched_readme = temp_dir / "README-mismatch.md"
          mismatched_readme.write_text(
              Path("README.md").read_text(encoding="utf-8").replace(
                  f"git tag v{version}",
                  "git tag v9.9.9",
                  1,
              ),
              encoding="utf-8",
          )
          expect_failure(
              ["--version-file", "VERSION", "--readme", str(mismatched_readme)],
              "a pinned tag mismatch fixture",
          )

          print(f"README pinned version references match VERSION={version} and reject mismatches.")
          PY

      - name: Validate README installer coverage
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          coverage_files = [Path("README.md"), Path("docs/developer-install.md")]
          coverage_text = "\n\n".join(path.read_text(encoding="utf-8") for path in coverage_files)
          required_snippets = [
              "scripts/install-plugin-status-runtime.ps1",
              "scripts/install-plugin-status-runtime.sh",
              "scripts/install-plugin-effort-control.ps1",
              "scripts/install-plugin-effort-control.sh",
              "scripts/install-plugin-usage-status.ps1",
              "scripts/install-plugin-usage-status.sh",
              "scripts/install-usage-only.ps1",
              "scripts/install-usage-only.sh",
              "scripts/install-all-local.ps1",
              "scripts/install-all-local.sh",
              "scripts/bootstrap-install-plugin-status-runtime.ps1",
              "scripts/bootstrap-install-plugin-status-runtime.sh",
              "scripts/bootstrap-install-plugin-effort-control.ps1",
              "scripts/bootstrap-install-plugin-effort-control.sh",
              "scripts/bootstrap-install-usage-only.ps1",
              "scripts/bootstrap-install-usage-only.sh",
              "scripts/bootstrap-install-all-local.ps1",
              "scripts/bootstrap-install-all-local.sh",
              "The plugin owns the canonical status layout under `<run_output_dir>/status/`",
              "The installer also ensures `~/.config/opencode/tui.json` contains `./plugins/usage-status/index.js`.",
              "Dry-run preview (resolves release metadata only):",
          ]

          missing = [snippet for snippet in required_snippets if snippet not in coverage_text]
          if missing:
              print("README/docs installer coverage is missing required installer/status-runtime snippets:")
              print("Searched files:")
              for path in coverage_files:
                  print(f"- {path}")
              for snippet in missing:
                  print(f"- {snippet}")
              raise SystemExit(1)

          print("README/docs installer coverage includes local/release plugin flows and canonical status layout notes.")
          PY

      - name: Validate bounded frontmatter regressions
        if: env.DOCS_ONLY != 'true'
        shell: bash
        run: |
          python3 - <<'PY'
          import importlib.util
          import textwrap
          from pathlib import Path

          repo_root = Path(".").resolve()

          def load_module(rel_path: str, module_name: str):
              spec = importlib.util.spec_from_file_location(module_name, repo_root / rel_path)
              module = importlib.util.module_from_spec(spec)
              assert spec.loader is not None
              spec.loader.exec_module(module)
              return module

          copilot = load_module("scripts/export-copilot-agents.py", "export_copilot_agents")
          codex = load_module("scripts/export-codex-agents.py", "export_codex_agents")
          claude = load_module("scripts/export-claude-agents.py", "export_claude_agents")

          valid_scalar_fixture = textwrap.dedent(
              """\
              ---
              name: bounded-valid
              description: Valid bounded frontmatter fixture
              mode: subagent
              temperature: 0
              ---
              Body line.
              """
          )
          valid_tools_fixture = textwrap.dedent(
              """\
              ---
              name: bounded-valid-tools
              description: Valid bounded frontmatter fixture with tools
              mode: subagent
              temperature: 0
              tools:
                bash: true
              ---
              Body line.
              """
          )

          copilot_fm, copilot_body = copilot.parse_frontmatter(
              valid_scalar_fixture, Path("valid-copilot.md")
          )
          assert copilot_fm["name"] == "bounded-valid"
          assert copilot_body == "Body line.\n"

          codex_fm, codex_tools, codex_body = codex.parse_frontmatter(
              valid_tools_fixture, Path("valid-codex.md")
          )
          assert codex_fm["name"] == "bounded-valid-tools"
          assert codex_tools == {"bash": True}
          assert codex_body == "Body line.\n"

          claude_fm, claude_tools, claude_body = claude.parse_frontmatter(
              valid_scalar_fixture, Path("valid-claude.md")
          )
          assert claude_fm["name"] == "bounded-valid"
          assert claude_tools == {}
          assert claude_body == "Body line.\n"

          invalid_cases = [
              (
                  "unbounded",
                  textwrap.dedent(
                      """\
                      ---
                      name: invalid
                      description: Missing closing boundary
                      mode: subagent
                      temperature: 0
                      Body line.
                      """
                  ),
                  "unterminated frontmatter block",
              ),
              (
                  "blank-line",
                  textwrap.dedent(
                      """\
                      ---
                      name: invalid

                      description: Blank line should fail
                      mode: subagent
                      temperature: 0
                      ---
                      Body line.
                      """
                  ),
                  "blank lines are not allowed inside frontmatter",
              ),
              (
                  "structured-value",
                  textwrap.dedent(
                      """\
                      ---
                      name: invalid
                      description: [not, bounded]
                      mode: subagent
                      temperature: 0
                      ---
                      Body line.
                      """
                  ),
                  "uses unsupported structured value",
              ),
              (
                  "model-key",
                  textwrap.dedent(
                      """\
                      ---
                      name: invalid
                      description: Runtime config should own model selection
                      model: gpt-test
                      mode: subagent
                      temperature: 0
                      ---
                      Body line.
                      """
                  ),
                  "configure model/provider in runtime config instead",
              ),
              (
                  "provider-key",
                  textwrap.dedent(
                      """\
                      ---
                      name: invalid
                      description: Runtime config should own provider selection
                      provider: local-test
                      mode: subagent
                      temperature: 0
                      ---
                      Body line.
                      """
                  ),
                  "configure model/provider in runtime config instead",
              ),
          ]

          for module, label in ((copilot, "copilot"), (codex, "codex"), (claude, "claude")):
              for case_name, fixture, expected_error in invalid_cases:
                  try:
                      module.parse_frontmatter(fixture, Path(f"{label}-{case_name}.md"))
                  except ValueError as exc:
                      if expected_error not in str(exc):
                          raise AssertionError(
                              f"{label} {case_name} error mismatch: {exc}"
                          )
                  else:
                      raise AssertionError(
                          f"{label} accepted invalid frontmatter case: {case_name}"
                      )

          print("Bounded frontmatter fixtures pass valid cases and reject malformed or unbounded inputs.")
          PY

      - name: Validate schema tool
        if: env.DOCS_ONLY != 'true'
        shell: bash
        run: |
          python3 --version
          python3 opencode/tools/validate-schema.py --help
          python3 -m py_compile scripts/install-codex-config.py
          python3 scripts/export-copilot-agents.py --source-agents opencode/agents --target-dir ./.tmp-copilot --strict --dry-run
          python3 scripts/export-codex-agents.py --source-agents opencode/agents --target-dir ./.tmp-codex --strict --dry-run
          python3 scripts/export-claude-agents.py --source-agents opencode/agents --target-dir ./.tmp-claude --strict --dry-run

      - name: Validate provider and skill helper tools
        if: env.DOCS_ONLY != 'true'
        shell: bash
        run: |
          python3 opencode/tools/provider-usage.py --help
          python3 opencode/tools/skill-manager.py --help
          python3 - <<'PY'
          import importlib.util
          from pathlib import Path

          repo_root = Path('.').resolve()
          skill_manager_path = repo_root / 'opencode' / 'tools' / 'skill-manager.py'
          spec = importlib.util.spec_from_file_location('skill_manager', skill_manager_path)
          module = importlib.util.module_from_spec(spec)
          assert spec.loader is not None
          spec.loader.exec_module(module)

          ref_url = module.build_github_contents_url('foo/bar', 'skills/demo', 'v1.2.3')
          if not ref_url.endswith('skills/demo?ref=v1.2.3'):
              raise SystemExit(f'Expected ref-aware contents URL, got: {ref_url}')

          mutable_text = module.render_text(
              {
                  'action': 'install',
                  'result': {
                      'name': 'demo-skill',
                      'source': 'anthropic',
                      'repo': 'anthropics/skills',
                      'ref': None,
                      'destinations': ['/tmp/demo-skill'],
                      'dry_run': True,
                  },
              }
          )
          if 'mutable' not in mutable_text:
              raise SystemExit('Expected mutable default-branch warning in skill-manager install output.')

          pinned_text = module.render_text(
              {
                  'action': 'install',
                  'result': {
                      'name': 'demo-skill',
                      'source': 'anthropic',
                      'repo': 'anthropics/skills',
                      'ref': 'v1.2.3',
                      'destinations': ['/tmp/demo-skill'],
                      'dry_run': True,
                  },
              }
          )
          if 'v1.2.3' not in pinned_text:
              raise SystemExit('Expected pinned ref to appear in skill-manager install output.')

          print('Provider/skill helper tools expose help text and skill-manager ref handling stays explicit.')
          PY

      - name: Validate Codex managed-merge install behavior
        if: env.DOCS_ONLY != 'true'
        shell: bash
        run: |
          rm -rf ./.tmp-codex-merge-check
          python3 - <<'PY'
          import json
          import subprocess
          import sys
          from pathlib import Path

          target = Path('.tmp-codex-merge-check')
          agents_dir = target / 'agents'
          agents_dir.mkdir(parents=True, exist_ok=True)

          (target / 'config.toml').write_text(
              '\n'.join([
                  'model = "gpt-5.4"',
                  'approval_policy = "on-request"',
                  '',
                  '[features]',
                  'multi_agent = false',
                  '',
                  '[agents.custom-user]',
                  'description = "Keep me"',
                  'config_file = "agents/custom-user.toml"',
                  '',
                  '[agents.old-removed]',
                  'description = "Old generated role"',
                  'config_file = "agents/old-removed.toml"',
                  '',
              ]),
              encoding='utf-8',
          )
          (agents_dir / 'old-removed.toml').write_text(
              '\n'.join([
                  '# Generated by scripts/export-codex-agents.py',
                  'name = "old-removed"',
                  'description = "Old generated role"',
                  'developer_instructions = "old"',
                  '',
              ]),
              encoding='utf-8',
          )
          (target / '.agents-pipeline-codex-manifest.json').write_text(
              json.dumps(
                  {
                      'managed_agent_names': ['old-removed'],
                      'managed_agent_files': ['agents/old-removed.toml'],
                  },
                  indent=2,
                  sort_keys=True,
              ) + '\n',
              encoding='utf-8',
          )

          subprocess.run(
              [
                  sys.executable,
                  'scripts/install-codex-config.py',
                  '--source-agents',
                  'opencode/agents',
                  '--target-dir',
                  str(target),
                  '--strict',
              ],
              check=True,
          )

          config = (target / 'config.toml').read_text(encoding='utf-8')
          if 'model = "gpt-5.4"' not in config:
              raise SystemExit('Expected Codex merge install to preserve model setting.')
          if 'approval_policy = "on-request"' not in config:
              raise SystemExit('Expected Codex merge install to preserve approval policy.')
          if '[agents.custom-user]' not in config:
              raise SystemExit('Expected Codex merge install to preserve custom user agent entry.')
          if '[agents.old-removed]' in config:
              raise SystemExit('Expected Codex merge install to remove stale managed agent entry.')
          if 'multi_agent = true' not in config:
              raise SystemExit('Expected Codex merge install to force features.multi_agent = true.')
          if 'max_threads = 6' not in config or 'max_depth = 2' not in config:
            raise SystemExit('Expected Codex merge install to refresh managed [agents] settings.')

          stale_file = agents_dir / 'old-removed.toml'
          if stale_file.exists():
              raise SystemExit('Expected Codex merge install to remove stale managed role file.')

          reviewer = (agents_dir / 'reviewer.toml').read_text(encoding='utf-8')
          for token in ('name = "reviewer"', 'description = ', 'developer_instructions = '):
              if token not in reviewer:
                  raise SystemExit(f'Missing expected generated reviewer token: {token}')

          manifest = json.loads((target / '.agents-pipeline-codex-manifest.json').read_text(encoding='utf-8'))
          if 'old-removed' in manifest['managed_agent_names']:
              raise SystemExit('Expected Codex merge manifest to drop stale managed agent names.')
          if 'reviewer' not in manifest['managed_agent_names']:
              raise SystemExit('Expected Codex merge manifest to include current managed agent names.')

          print('Codex managed-merge install regression check passed.')
          PY

      - name: Validate optional stale generated-file cleanup
        if: env.DOCS_ONLY != 'true'
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          required_tokens = {
              "scripts/export-copilot-agents.py": [
                  "find_stale_generated_outputs",
                  "Removed stale generated file:",
              ],
              "scripts/export-codex-agents.py": [
                  "find_stale_generated_outputs",
                  "Removed stale generated file:",
              ],
              "scripts/export-claude-agents.py": [
                  "find_stale_generated_outputs",
                  "Removed stale generated file:",
              ],
          }

          missing = []
          for rel_path, tokens in required_tokens.items():
              content = Path(rel_path).read_text(encoding="utf-8")
              if any(token not in content for token in tokens):
                  missing.append(rel_path)

          if missing:
              print(
                  "Skipping optional stale cleanup regression checks; DS-003 implementation not detected in: "
                  + ", ".join(missing)
              )
              raise SystemExit(0)
          PY

          rm -rf ./.tmp-stale-cleanup
          python3 - <<'PY'
          import importlib.util
          import subprocess
          import sys
          from pathlib import Path

          repo_root = Path('.').resolve()
          base_dir = repo_root / '.tmp-stale-cleanup'

          def load_module(rel_path: str, module_name: str):
              spec = importlib.util.spec_from_file_location(module_name, repo_root / rel_path)
              module = importlib.util.module_from_spec(spec)
              assert spec.loader is not None
              spec.loader.exec_module(module)
              return module

          def stale_marker_text(marker: str) -> str:
              if marker.startswith('<!--') and not marker.endswith('-->'):
                  return f"{marker} -->\n"
              return f"{marker}\n"

          exporters = [
              ('copilot', 'scripts/export-copilot-agents.py', 'export_copilot_agents'),
              ('codex', 'scripts/export-codex-agents.py', 'export_codex_agents'),
              ('claude', 'scripts/export-claude-agents.py', 'export_claude_agents'),
          ]

          for label, rel_path, module_name in exporters:
              target_dir = base_dir / label
              subprocess.run(
                  [
                      sys.executable,
                      str(repo_root / rel_path),
                      '--source-agents',
                      'opencode/agents',
                      '--target-dir',
                      str(target_dir),
                      '--strict',
                  ],
                  check=True,
              )

              module = load_module(rel_path, module_name)
              marker = module.GENERATED_MARKER
              generated_files = [
                  path
                  for path in target_dir.rglob('*')
                  if path.is_file() and marker in path.read_text(encoding='utf-8', errors='ignore')
              ]
              if not generated_files:
                  raise SystemExit(f'Expected {label} exporter to generate at least one marked output.')

              sample = generated_files[0]
              if label == 'codex' and sample.name == 'config.toml':
                  sample = next(
                      path for path in generated_files if path.parent.name == 'agents'
                  )
              suffix = ''.join(sample.suffixes)
              stale = sample.with_name(f'stale-generated{suffix}')
              custom = sample.with_name(f'custom-kept{suffix}')
              stale.write_text(stale_marker_text(marker), encoding='utf-8')
              custom.write_text(f'custom {label} content\n', encoding='utf-8')

              subprocess.run(
                  [
                      sys.executable,
                      str(repo_root / rel_path),
                      '--source-agents',
                      'opencode/agents',
                      '--target-dir',
                      str(target_dir),
                      '--strict',
                  ],
                  check=True,
              )

              if stale.exists():
                  raise SystemExit(f'Expected stale generated {label} file to be removed: {stale}')
              if not custom.exists():
                  raise SystemExit(f'Expected custom {label} file to remain: {custom}')

              print(f'{label.capitalize()} cleanup check passed: removed {stale.name}, kept {custom.name}')
          PY

      - name: Validate modernize handoff schema and examples
        if: env.DOCS_ONLY != 'true'
        shell: bash
        run: |
          python3 scripts/validate-modernize-handoff.py --help
          python3 -m py_compile scripts/validate-modernize-handoff.py
          python3 -m pip install jsonschema

          python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/dispatch-plan.schema.json \
            --input opencode/protocols/examples/dispatch-plan.resource.valid.json \
            --require-jsonschema

          if python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/dispatch-plan.schema.json \
            --input opencode/protocols/examples/dispatch-plan.resource.invalid.json \
            --require-jsonschema; then
            echo "Expected invalid dispatch plan example to fail schema validation." >&2
            exit 1
          fi

          if python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/dispatch-plan.schema.json \
            --input opencode/protocols/examples/dispatch-plan.browser-unsafe.invalid.json \
            --require-jsonschema; then
            echo "Expected unsafe browser dispatch plan example to fail schema validation." >&2
            exit 1
          fi

          if python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/dispatch-plan.schema.json \
            --input opencode/protocols/examples/dispatch-plan.process-unsafe.invalid.json \
            --require-jsonschema; then
            echo "Expected unsafe process dispatch plan example to fail schema validation." >&2
            exit 1
          fi

          if python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/dispatch-plan.schema.json \
            --input opencode/protocols/examples/dispatch-plan.server-no-teardown.invalid.json \
            --require-jsonschema; then
            echo "Expected server dispatch plan without teardown to fail schema validation." >&2
            exit 1
          fi

          python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/modernize-exec-handoff.schema.json \
            --input opencode/protocols/examples/modernize-exec-handoff.valid.json \
            --require-jsonschema

          python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/handoff-pack.schema.json \
            --input opencode/protocols/examples/handoff-pack.valid.json \
            --require-jsonschema

          python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/flow-task-list.schema.json \
            --input opencode/protocols/examples/flow-task-list.valid.json \
            --require-jsonschema

          python3 opencode/tools/validate-schema.py \
            --schema opencode/protocols/schemas/todo-ledger.schema.json \
            --input todo-ledger.example.json \
            --require-jsonschema

