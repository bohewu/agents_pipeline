      - name: Validate resource-control prompt coverage
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path

          checks = {
              Path("opencode/agents/router.md"): [
                  "resource_class",
                  "max_parallelism",
                  "teardown_required",
                  "browser",
                  "server",
              ],
              Path("opencode/agents/orchestrator-pipeline.md"): [
                  "resource_class = browser",
                  "teardown_required = true",
                  "Resource Gate",
              ],
              Path("opencode/agents/orchestrator-flow.md"): [
                  "resource-safe to co-run",
                  "teardown evidence",
                  "browser",
                  "server",
              ],
              Path("opencode/agents/executor.md"): ["RESOURCE CLEANUP (MANDATORY)", "repair_budget"],
              Path("opencode/agents/generalist.md"): ["RESOURCE CLEANUP (MANDATORY)"],
              Path("opencode/agents/peon.md"): ["RESOURCE CLEANUP (MANDATORY)"],
              Path("opencode/agents/test-runner.md"): ["RESOURCE CLEANUP (MANDATORY)"],
              Path("opencode/agents/reviewer.md"): ["RESOURCE EVIDENCE", "teardown_required"],
              Path("opencode/protocols/PIPELINE_PROTOCOL.md"): [
                  "resource_class",
                  "max_parallelism",
                  "teardown_required",
                  "batches set `teardown_required = true` only",
              ],
              Path("opencode/protocols/PROTOCOL_SUMMARY.md"): [
                  "resource_class",
                  "max_parallelism",
                  "teardown_required",
                  "lingering child-process resources",
              ],
              Path("opencode/protocols/VALIDATION.md"): [
                  "## Resource Gate",
                  "teardown_required = true",
              ],
              Path("opencode/protocols/SCHEMAS.md"): [
                  "required batch resource metadata",
              ],
              Path("opencode/commands/run-pipeline.md"): [
                  "teardown evidence",
              ],
              Path("opencode/commands/run-flow.md"): [
                  "teardown evidence",
              ],
              Path("README.md"): [
                  "Execution Resource Control",
                  "dispatch-plan resource schema/examples validation",
                  "resource-control prompt coverage assertions",
              ],
          }

          missing = []
          for path, tokens in checks.items():
              text = path.read_text(encoding="utf-8")
              absent = [token for token in tokens if token not in text]
              if absent:
                  missing.append(f"{path}: missing {absent}")

          if missing:
              raise SystemExit("\n".join(missing))

          print("Resource-control prompt coverage checks passed.")
          PY

      - name: Validate shell installers
