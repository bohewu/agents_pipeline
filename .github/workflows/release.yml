name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (for example: v0.4.0)"
        required: true
        type: string

jobs:
  bundle:
    uses: ./.github/workflows/release-bundle.yml
    permissions:
      contents: read
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      checkout_tag: true
      upload_artifact: true

  release:
    needs: bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Download release bundle artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.bundle.outputs.artifact_name }}
          path: dist

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.bundle.outputs.tag }}
        shell: bash
        run: |
          files=(dist/*.tar.gz dist/*.zip dist/*.SHA256SUMS.txt)

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" "${files[@]}" --clobber
          else
            gh release create "${TAG_NAME}" "${files[@]}" --generate-notes
          fi
