name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (for example: v0.4.0)"
        required: true
        type: string

jobs:
  bundle:
    uses: ./.github/workflows/release-bundle.yml
    permissions:
      contents: read
    with:
      tag: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
      checkout_tag: true
      upload_artifact: true

  release:
    needs: bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release bundle artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.bundle.outputs.artifact_name }}
          path: dist

      - name: Publish release assets
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: ${{ needs.bundle.outputs.tag }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.SHA256SUMS.txt
